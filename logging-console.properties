# Config de logging para rodar o MAS em ambiente HEADLESS (sem X11).
#
# O JaCaMoLauncher, por padrao, usa /templates/logging.properties (do jar),
# que registra o jason.runtime.MASConsoleLogHandler (console GRAFICO). Sem
# display isso lanca HeadlessException e os .print dos agentes somem.
#
# Aqui usamos o ConsoleHandler padrao do java.util.logging, que escreve no
# console (stderr) - assim enxergamos os .print dos agentes, falhas de plano,
# erros de focus etc. tambem em terminal/CI.
#
# Para usar: ./gradlew run  (o build.gradle ja passa --log-conf para ca)
# Para voltar ao console grafico (rodando com tela), basta remover o
# argumento --log-conf no build.gradle.

handlers = java.util.logging.ConsoleHandler

.level = INFO

java.util.logging.ConsoleHandler.level = FINE
java.util.logging.ConsoleHandler.formatter = jason.runtime.MASConsoleLogFormatter

# Silencia ruido de bibliotecas
java.level=OFF
javax.level=OFF
sun.level=OFF
jade.level=OFF
